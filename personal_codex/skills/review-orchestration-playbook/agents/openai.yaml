interface:
  display_name: "Review Orchestration Playbook"
  short_description: "Run fresh Codex single, actual-Claude double, or GitHub triple."
  default_prompt: "Use $review-orchestration-playbook as the only review entrypoint. Resolve the local frozen range and PR selector independently. Preserve an explicit base_sha..head_sha for local lanes; independently select an explicitly named PR or exactly one authenticated open PR for the exact current head repo/branch when PR-specific or triple work is requested. Explicit-range-only single/double needs no PR probe. For every selected PR, including an explicitly named one, require authenticated state=open, merged=false, and merged_at=null; missing or contradictory lifecycle evidence is blocked-input pr-lifecycle-unverified, closed-unmerged is selected-pr-closed, merged is terminal already-merged/selected-pr-merged, and an observed non-open lifecycle at any mandated post-start snapshot is triple-inconclusive. Revalidate lifecycle at selection, before posting, before accepting a result, and before readiness/merge; those point-in-time snapshots do not prove that no intermediate close-and-reopen occurred. Then read authenticated baseRefName/baseRefOid/headRefOid, require locally complete endpoint commits and exactly one git merge-base, and require base_sha == pr_merge_base and head_sha == pr_head_oid before counting PR-specific readiness or triple coverage. A same-head/different-base range is blocked-input scope-mismatch and must not be rewritten or described as whole-PR coverage. Multiple required PR candidates or a proven no-PR path without explicit range/target are blocked-input; triple with detached/unknown branch and no explicit PR is blocked-input/triple-inconclusive, not effective double. A report-only request never authorizes an anchor commit; intended dirty/untracked state without a representing committed range is blocked-authorization. Single is exactly one read-only Codex reviewer agent launched with fork_turns=none in its own clean Git worktree; give it control metadata and refs, not a prebuilt full diff, and let it load applicable guidance and inspect the range with bounded Git/tools. Double adds an actual Claude Code process launched directly in another independent read-only worktree; capture raw stdout outside that worktree and require validate_claude_stream.py classification accepted before findings count; isolated_review and Copilot never count. Triple adds exact @codex review plus a complete terminal provider-authored current-head GitHub Codex findings payload only on exact host github.com; every other host and operating identity hoteng or hoteng_cisco is unsupported. Completion evidence must come from exact chatgpt-codex-connector[bot] with REST type Bot: fetch the review body plus every fully paginated associated inline review comment, or a terminal issue-comment body, and bind it to the current head, whole-PR range, and isolated request. Missing or ambiguous payload, terminal nature, or association means triple-inconclusive. For one unchanged head, re-read complete authenticated request history immediately before posting and accepting; at most one accepted exact request may exist, never post a second, and an older request that might overlap the candidate artifact makes the lane triple-inconclusive. A post-request base-only retarget invalidates whole-PR evidence but cannot authorize a replacement same-head request: report blocked-input base-changed-same-head and effective triple-inconclusive until a separately authorized ordinary change creates a new head; never manufacture an empty or anchor commit. Timestamps prove ordering, not request/run lineage. An exact app-slug chatgpt-codex-connector current-head check/run whose non-null started_at is strictly later than the request proves service start only; it never completes triple or proves clean/no-findings even when completed/success. A same-App check may be unrelated and success may coexist with review findings. No PR or proved integration/host/identity/service unavailability means effective double. An existing supported PR/head mismatch without separate mutation authorization means requested triple, effective triple-inconclusive, and GitHub lane blocked-authorization. Missing response, unknown provider identity, or generic failure means triple-inconclusive; malformed, stale, ambiguous, incomplete, or check-only evidence after service start means triple-inconclusive. Do not add retired extra Codex gates."
