interface:
  display_name: "Review Orchestration Playbook"
  short_description: "Run fresh Codex single, actual-Claude double, or GitHub triple."
  default_prompt: "Use $review-orchestration-playbook as the only review entrypoint. Freeze base_sha..head_sha. Single is exactly one read-only Codex reviewer agent launched with fork_turns=none in its own clean Git worktree; give it control metadata and refs, not a prebuilt full diff, and let it load applicable guidance and inspect the range with bounded Git/tools. Double adds an actual Claude Code process launched directly in another independent read-only worktree; isolated_review and Copilot never count. Triple adds a trustworthy terminal current-head GitHub Codex result on a supported GitHub Cloud PR, normally requested with exact @codex review. No PR or proved integration/host/identity/service unavailability means effective double; missing response/generic failure or malformed, stale, ambiguous, or incomplete evidence after service start means triple-inconclusive. Do not add retired extra Codex gates."
