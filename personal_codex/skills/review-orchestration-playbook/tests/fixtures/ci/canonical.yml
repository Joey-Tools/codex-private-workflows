name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  platform_tests:
    name: platform-tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Python test dependencies
        run: |
          python3 -m pip install --disable-pip-version-check --no-input 'tomli==2.2.1; python_version < "3.11"'
      - name: Install Linux isolation dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes bubblewrap gcc ripgrep socat
      - name: Enable unprivileged user namespaces for Linux isolation test
        if: runner.os == 'Linux'
        run: |
          if [[ -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
      - name: Compile Python helpers
        run: |
          python3 -m py_compile skills/review-orchestration-playbook/scripts/isolated_review skills/review-orchestration-playbook/scripts/review_runtime/*.py
      - name: Check Linux launcher C syntax
        run: |
          cc -std=c11 -O2 -Wall -Wextra -Werror -D_POSIX_C_SOURCE=200809L -fsyntax-only skills/review-orchestration-playbook/scripts/review_runtime/claude_linux_launcher.c
      - name: Run tests
        run: |
          python3 -m unittest discover -s skills/review-orchestration-playbook/tests -p 'test_*.py' -v
      - name: Run real Linux isolation integration test
        if: runner.os == 'Linux'
        env:
          CODEX_REVIEW_RUN_LINUX_ISOLATION_INTEGRATION: "1"
        run: |
          python3 -m unittest -v skills/review-orchestration-playbook/tests/test_claude_linux.py

  test:
    name: test
    if: ${{ always() }}
    needs: platform_tests
    runs-on: ubuntu-latest
    steps:
      - name: Require every platform test to pass
        env:
          PLATFORM_TESTS_RESULT: ${{ needs.platform_tests.result }}
        run: |
          test "$PLATFORM_TESTS_RESULT" = "success"
