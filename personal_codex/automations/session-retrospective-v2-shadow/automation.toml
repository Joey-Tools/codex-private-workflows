name = "Session Retrospective v2 Shadow"
prompt = """
Run the Session Retrospective v2 acceptance-campaign shadow. This automation is always non-publishing.

Use /Users/hoteng/Program/GitHub/Joey-Tools/codex-workspace as the stable workspace cwd. Treat local and remote Codex history as read-only. The only allowed writes are ignored owner-only run, calibration, staging, shadow-simulation, and receipt artifacts below .codex-local/session-retrospective-v2-shadow/. On first use only, the runner may create the missing ignored .codex-local parent with mode 0700 after validating the fixed workspace; an existing parent must be a real current-user directory that is not group/world writable. Create all shadow artifact directories with mode 0700 and files with mode 0600. Do not write to ~/.codex, any remote host, any tracked repository path, any production retrospective state, or any live Daily or Weekly automation path, whether absent or present. The reference-only Daily and Weekly release templates are not evidence that a live automation is registered; this shadow runner cannot perform a first registration or a verified in-place update.

Enforcement entrypoint:
- Every v2 coordinator invocation must run through the installed shadow runner. Individual actions use `python3 $HOME/.codex/skills/remote-host-context/scripts/session_retrospective_v2_shadow_runner.py run --invocation-dir <absolute-run-local-directory> [--host <canonical-host>] -- <coordinator-command> ...`; the Daily qualification uses the runner's `bootstrap-daily-holdout-identity`, `start-daily-pair`, and `start-daily-pair-successor` actions. Every accepted backfill must use that runner's `record-backfill` action. Direct coordinator execution is forbidden. For `accept-source`, the runner must verify the status-authenticated transport-program SHA-256 commitment, execute an owner-only snapshot of exactly those bytes, capture its stdout into an owner-only temporary file, refresh output-idle time from published output or its bounded owner-only raw-chunk progress sidecar while enforcing a lease-derived total wall-clock limit, atomically publish it to the authenticated stream path, and call the matching coordinator action under one per-host lock; never pre-capture or replace that stream outside the runner. The transport helper must execute the remote stdin program with `python3 -I -B -`, scan/hash the remote source, and re-read exact source offsets for frame emission without a remote spool, temporary file, or other remote write; every content-free gap must own one record and stay within its processing/scan ceiling. The local receiver may append only content-free chunk progress to the authenticated sidecar below the invocation root. Once the inert `simulation-history` directory exists, the runner rechecks that it remains empty after every coordinator action. The runner, not this prompt, is the enforcement authority for the command/action allowlist, write boundary, subprocess timeouts, no-provider/no-production-state policy, and per-host mutual exclusion. A supervisor cleanup failure or forced supervisor kill blocks the scenario and must not be masked by the original timeout.
- Treat any runner rejection, unavailable pre-execution write sandbox, or lock failure as a blocked scenario. Never bypass the runner or retry the same action directly.

Strict installed-v2 gate:
- Read the installed $HOME/.codex/skills/codex-session-retrospective/SKILL.md and only the v2 references needed for the current stage. Use exactly $HOME/.codex/skills/codex-session-retrospective/scripts/session_retrospective_v2.py; do not use a source-checkout fallback or the installed v1 entry point.
- Parse every helper response as one machine-readable JSON object. Before starting a run, invoke the coordinator's no-argument `help` action through the runner and require top-level `schema == "cli_result_v2"`, `ok == true`, the v2 command set including `identity`, and the native `session-shards`/`accept-source` bridge contract. Run `doctor` through the runner and require exit 0, top-level `command == "doctor"`, `result.ok == true`, `result.errors == []`, `result.schema_version == 2`, and every doctor check to be true. After `start`, require `status` to report `schema_version == 2`, `provenance.versions.engine == "2.0"`, and a 64-character lowercase-hex `provenance.configuration_root`. Stop without running a shadow scenario when any strict check fails.
- Use the installed $HOME/.codex/skills/remote-host-context/SKILL.md and $HOME/.codex/skills/remote-host-context/scripts/remote_codex_probe.py. Require its help to expose `session-shards` before collecting evidence. A read-only $remote-host-context preflight may check local, miku-bot-dev, and hoteng-srv-01, but `session-shards` is the only evidence transport across those hosts.

Hard non-publishing gate:
- The runner's allowed v2 coordinator commands are `help`, `identity`, `doctor`, `start`, `status`, `accept-source`, `accept-agent-result`, `advance`, `export`, and `finalize` with an allowlisted phase and `--shadow`. Every finalize invocation must include `--shadow` and must not include `--provider-state`.
- Reject and stop if any proposed command asks for a formal send, formal history write, history commit, cursor or head advancement, provider-state path, v1 state mutation, or production automation update. Do not invoke GitHub, prepare a history worktree, create a Git commit, create or update a Git ref, push, or call an automation-management operation.
- Never pass a production cursor state into `start`. Never read or write any production retrospective history/state, the v1 state path, the formal history repository, or a production history ref.
- For the CLI-required shadow simulation binding, use only .codex-local/session-retrospective-v2-shadow/simulation-history/ as an empty mode-0700 real directory. Do not initialize it as a Git repository. Pass the inert validation-only target `refs/heads/session-retrospective-v2-shadow-simulation`; no such ref may be created. The directory and target are local schema inputs, not a formal history repository or ref.
- Before `doctor` or `start`, choose one explicit absolute run-local coordinator identity file below the timestamped invocation directory and create it exactly once through the runner's `identity --create-identity --identity-path <path> --shadow` action. Every later coordinator action must use that exact path with `--require-existing-identity`. Before `start-daily-pair`, create the separate source holdout identity exactly once through the runner's `bootstrap-daily-holdout-identity --invocation-dir <invocation> --holdout-identity-path <invocation>/holdout-identity` action. That bootstrap creates identity material only: it cannot emit a receipt, consume a source lease, or run transport. The later status-authenticated `session-shards` source action must carry its exact lease and the same path with `--require-existing-shadow-identity`; the runner rejects `--create-shadow-identity` in that leased action. Never accept an implicit/default identity, create or read an identity under production history/state, silently replace either identity, or continue when owner/mode checks fail.
- If a command cannot stay inside this allowlist and local artifact root, report the scenario blocked instead of weakening the guardrails.

Evidence and coordinator loop:
- Use exactly the configured host set local, miku-bot-dev, and hoteng-srv-01. Do not silently drop a host. Do not use bare SSH, SCP, session-meta, fetch-rollout, rollout-summary, chunked-rollout-summary, a bundled retrospective remote probe, or an agent as an alternate transport.
- Drive each run only from machine-readable coordinator actions: `status -> accept-source/accept-agent-result -> advance`. For every source lease, pass the exact status-provided transport contract to the coordinator's native `session-shards`/`accept-source` bridge; before snapshot or execution, the runner must compare every controlled-holdout argv binding against the authenticated action and lease, including host, emit/qualification mode, exact window, source kind, source lease ref, controlled-missing-host flag, and identity reuse mode, while rejecting unrelated rollout/range options. The bridge must invoke the installed remote-host-context helper with the runner Python's mandatory `-I` isolated mode, validate its closed frames or terminal receipt, and accept that exact lease. Do not execute or pipe `session-shards` as a separate source driver. Preserve exact source tokens, resume cursors, request bindings, byte ranges, EOF proofs, source-lease refs, and explicit content-free gaps. Source transport is serial per host.
- Never invoke bundled `execute-source`, any bundled source executor/probe, remote-agent SSH, a remote Codex agent, bare SSH, or an agent result as a substitute for native source acceptance. If the native bridge cannot represent a status-issued request, stop the scenario as blocked.
- For runnable agent jobs, launch native ephemeral subagents at the maximum concurrency currently available. Do not use shell agent CLIs or persistent agents. Give each agent exactly one status-provided bounded job manifest and declared schema. Raw shards may go only to their extractor/redactor agent; all later agents receive validated redacted structures. Accept each result with the exact job and attempt refs, allow at most one fresh-agent retry, and retain a second failure as an explicit gap. Run remaining jobs in waves when the runtime limit is lower than the runnable set.
- Continue until status reports the run at stage `export`. Do not bypass `accept-source`, `accept-agent-result`, or `advance`, and do not infer a successful stage from prose.

One invocation must attempt all of these acceptance scenarios under one timestamped invocation directory:
1. Weekly shadow: use the latest closed UTC seven-day window `[start, end)`, ending at the most recent 00:00:00Z. Start `weekly` with all three configured hosts and require complete or no-activity accounting for every host. A partial Weekly is invalid and receives no valid receipt.
2. Daily partial shadow: first run `bootstrap-daily-holdout-identity` for one direct-child identity directory below the invocation, then use `start-daily-pair` with `--holdout-identity-path` set to that exact absolute directory for the latest closed UTC day with all three configured hosts and explicit partial policy. The runner must persist that identity's key ID before starting the partial, and the receipt plus direct successor must retain the same identity; replacement blocks the pair. The pair manifest must state `production_source_suppressed == false`; never generate the gap by omitting a configured host, disabling a production source, or intercepting a production automation. Select one missing remote host deterministically, preferring a host that preflight actually found unavailable and otherwise using hoteng-srv-01. For exactly that host and exactly one status-issued source lease, have the native bridge request one `holdout-receipt` with `--qualification-mode shadow`, `--controlled-missing-host`, the exact host/window/source-kind/source-lease binding, `--require-existing-shadow-identity`, and the invocation's bootstrapped identity. Require the authenticated reason `shadow_qualification_controlled_missing_host`, `content_free == true`, `source_observed == false`, `transport_attempted == false`, and `backfill_required == true`. Record it as controlled fault injection and retain its `holdout_ref`; never claim `no_activity`, unreachability, timeout, auth failure, invalid JSON, or processing-budget exhaustion. The initial run must end with partial coverage for that host. Exactly one controlled holdout is allowed in the invocation; if the native bridge cannot accept it through the closed contract, mark the scenario blocked.
3. Daily missing-host backfill shadow: use `start-daily-pair-successor` immediately after the authenticated controlled partial reaches its terminal export state. The runner must verify the partial's exact run ref, closed coverage receipt, sole gap, all-other-host coverage, empty active leases, identity, configuration, and window before it starts the direct successor. The successor uses the same daily window and run configuration, selects only the held-out host, passes the partial run's exact run ref as `--backfill-of`, and carries the authenticated controlled-gap receipt. The backfill source contract must preserve the exact host/window/source kind and identify the authenticated `holdout_ref` it replaces. Use only real descriptor/record transport through the native `session-shards`/`accept-source` bridge and require complete or genuine no-activity accounting for that host. Never emit or accept another holdout for backfill. After real accounting succeeds, use only the runner's `record-backfill` action so authenticated receipt consumption and replacement lineage commit in one persistent transaction. Require its sandboxed coordinator verifier, bind both coverage receipts to their status mode/window, derive the result from the exact closed source cell, require the host aggregate to agree, and accept no-activity only with a zero-record manifest. The backfill must contain exactly that one cell, manifest, snapshot ref, transport receipt ref, and single-source unit accounting; extra source evidence is fatal. Consume the status-bound source transport receipt and backfill source lease exactly once in the same ledger transaction, and reject cross-holdout reuse. Require matching identity/configuration root and atomic replacement lineage; reject replay, a different lease/host/window/source kind, or an already replaced holdout. Do not treat the pair as valid unless both scenario receipts bind the same configuration root, identity key ID, and window.

Local export, validation, and shadow simulation:
- Export every exportable run to a distinct owner-only staging directory below the invocation root. Require the export response to report exactly `manifest.json`, `coverage.json`, `episodes.jsonl`, `turn_findings.jsonl`, `topics.jsonl`, `trend_report.json`, `report.md`, and `summary.json`, with `git_commit_created == false` and `state_advanced == false`.
- Validate the staged inventory, JSON/JSONL shape, owner/mode constraints, retained bundle digest, report generation, and privacy policy locally. Reject raw prompts or excerpts, tool output, source paths, raw IDs, internal URLs, secrets, credentials, customer or personal data, and proprietary snippets. Treat helper shadow prepare/seal/compliance checks as the history-shape simulation; never substitute a formal history validator or publication.
- Run finalize phases `prepare`, `stage`, `seal`, `close-compliance`, `promote`, `commit`, and `status` in order, always with `--shadow`, the empty local simulation directory, and the inert target. Require final `kind == "shadow"`, `phase == "committed"`, `state_advanced == false`, `provider.attempt_present == false`, no provider state, no simulation-directory content, no Git ref, no history commit, and unchanged pre/post host cursor values. The coordinator run must remain at stage `export` after shadow completion.

Receipts and reporting:
- Write one canonical local receipt per valid scenario under .codex-local/session-retrospective-v2-shadow/receipts/. Bind it to the automation ID, invocation ID, scenario, run ref, lineage/backfill ref, exact window, identity key ID, engine version, configuration root, host coverage, bundle digest, shadow finalize attempt ref and terminal phase, validation outcomes, and explicit null formal-history/provider-state fields. Include a digest of the canonical receipt body and write it atomically with mode 0600.
- A receipt is valid only when all strict, coverage, export, privacy, inventory, shadow-finalize, no-write, and no-advance checks pass. Preserve invalid or blocked scenario diagnostics locally, but do not count them as valid receipts.
- Accumulate only distinct valid receipts for the current configuration root. A configuration-root change starts a new campaign count; retain older receipts as invalidated comparison evidence. Weekly receipts are distinct only when their run/window and terminal shadow attempt are distinct. Repeated scheduled or manual invocations provide the two required Weekly runs; one invocation must not manufacture two Weekly receipts.
- Report the exact current configuration root, attempted windows, per-host coverage and gaps, subagent concurrency/waves, each scenario result, the accumulated count of distinct valid Weekly receipts, the accumulated count of valid Daily partial/backfill pairs, and any invalidated-root receipts. Never claim that calibration, the shadow gate, cutover, or production readiness passed automatically, even when receipt counts meet a numeric threshold.
"""
