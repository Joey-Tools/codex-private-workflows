prompt = "Generate paste-ready English daily work report drafts for every eligible local calendar day from the local day containing `Last run` through the last fully completed local calendar day before this run, inclusive. If `Last run` is missing or unusable, fall back to only the previous local calendar day. Process candidate days in ascending date order, one day at a time. Use [$apple-notes-work-report](/Users/hoteng/Program/GitHub/Codex-maintenance/.agents/skills/apple-notes-work-report/SKILL.md) as the workflow authority for report boundaries, Apple Notes comparison rules, inclusion rules, supplemental shell-evidence handling, and fallback handling. Use [$report-drafting-example](/Users/hoteng/Program/GitHub/Codex-maintenance/.agents/skills/apple-notes-work-report/references/report-drafting-example.md) as the canonical short-form output example whenever format is ambiguous or confidence is low, and follow that example instead of inventing a new layout. For each candidate day, first read the matching note in the Apple Notes Work Report folder by date-title prefix `YYYY.MM.DD`, then always run [$remote-host-context](/Users/hoteng/.codex/skills/remote-host-context/SKILL.md) preflight across `local`, `miku-bot-dev`, and `hoteng-srv-01` before concluding evidence coverage, even when the local ~/.codex history already looks dense, because long-lived remote sessions can hide missing work from a local-only scan. Compare the note against work evidence mined from local ~/.codex plus any relevant remote rollout evidence surfaced by that preflight. If remote rollout evidence is truncated or any `chunk_meta` has `raw_fetch_recommended=true`, follow `$remote-host-context`'s `chunked-rollout-summary` and bounded `fetch-rollout-chunk` fallback before treating that host as covered; if that fallback is blocked, state the exact host, rollout, chunk, fetch range, or gate. Also use the skill's bounded local supplemental pass over `~/.codex/shell_snapshots/`, shell history, and `~/.dotfiles/.iterm_input_logs/` when Codex-only evidence may miss manual terminal work. This task is read-only with respect to Apple Notes and must not edit notes. Skip a candidate day entirely if both of these are true: (a) there is no matching Apple Notes note, or the note has no meaningful report content worth preserving, and (b) local/remote Codex evidence plus supplemental shell evidence find no clear reportable or note-led work for that day. Do not emit placeholder output for skipped days. For each included day, keep the existing short-form layout with one date header and a few numbered buckets. Output one inbox item that starts with a brief Chinese note covering the scanned date range, evidence coverage, the Apple Notes comparison result, and any caveats. That Chinese note must explicitly state which hosts were checked, which hosts contributed relevant evidence, which hosts were stale, empty, or unreachable, and whether supplemental local shell evidence changed the result. Then include a single fenced text code block containing only the clean British English final drafts for all included days in ascending date order, with blank lines between day blocks and no extra commentary inside the code block. The code block must contain the corrected final drafts Joey can paste; incorporate confirmed omissions directly into the relevant day blocks rather than listing raw diffs inside the code block. Outside the code block, separately note likely omissions, uncertain items, and auto-excluded or needs-scope-confirmation items when relevant. If Apple Notes access is blocked for a day or a target note does not exist, state the exact limitation outside the code block and continue with a Codex-only draft for that day if there is enough evidence. If remote-host preflight fails for a host, state the exact host and gate outside the code block instead of silently falling back to local-only confidence. If no days in the scanned range qualify for inclusion after the skip rules above, output one Chinese note explaining that nothing qualified and omit the code block."
