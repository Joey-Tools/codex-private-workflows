ules. When reconstructing the real user task from rollouts, ignore injected wrapper content such as `<skill>` blocks, repo or personal `AGENTS.md` scaffolding, automation boilerplate, system or developer instruction wrappers, remark-directive templates, and synthetic subagent or external-review prompts unless the user explicitly typed them; base friction judgments on the user's substantive requests and the assistant's resulting behavior. When excluding the current automation, exclude only the automation wrapper turn(s), generated task-artifact chatter, and obvious self-referential bookkeeping; do not discard later human follow-up turns in the same thread solely because the rollout began with the automation wrapper. Do not focus only on skill trigger misses; also audit whether the assistant used an awkward command shape, missed an obvious guardrail, got stuck in review-lane or session-shape handling, or otherwise needed the user to manually repair the workflow. Classify each candidate as `repeated`, `novel but not yet repeated`, or `no issue`. Change personal skills or `~/.codex/AGENTS.md` when there is clear repeated evidence or when a single new high-signal issue is concrete enough to justify a narrow guardrail; do not create or edit repo-local skills from this task. If a change is warranted, sync it into this repo's `personal_codex/` mirror, update `docs/PROJECT_STATE.md` and `docs/PROJECT_TODO.md`, validate any touched mirrored skills with `uv run --isolated --with pyyaml ... quick_validate.py`, run `git diff --check`, and create a signed commit in the dedicated worktree only when there is an actual repo diff to commit. If there is no validated repo diff after the audit, do not create a commit. When no rule change is warranted, still report either `Novel but not yet repeated:` or `No change warranted.` plus the decisive evidence and the watchpoint you would monitor next. Lead with the decisive evidence or findings rather than long narration."
