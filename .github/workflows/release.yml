name: Private Overlay Release

on:
  pull_request:
    paths:
      - ".agents/**"
      - ".github/workflows/release.yml"
      - "README.md"
      - "personal_codex/**"
      - "scripts/**"
      - "tests/**"
  push:
    paths:
      - ".agents/**"
      - ".github/workflows/release.yml"
      - "README.md"
      - "personal_codex/**"
      - "scripts/**"
      - "tests/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: private-overlay-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build private overlay release
    if: github.event_name != 'push' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-slim
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compile helpers
        run: |
          python3 -m py_compile \
            scripts/codex_personal_sync.py \
            scripts/build_personal_codex_package.py \
            scripts/private_overlay_release.py \
            scripts/sync_private_overlay_sources.py \
            tests/test_private_overlay_package.py \
            tests/test_private_overlay_sync.py

      - name: Run tests
        run: python3 -m unittest discover -s tests

      - name: Build release package
        run: |
          python3 scripts/build_personal_codex_package.py \
            --sha "$GITHUB_SHA" \
            --output-dir dist

      - name: Verify release package
        run: |
          python3 scripts/private_overlay_release.py verify-package \
            --sha "$GITHUB_SHA" \
            --dist dist

  publish:
    name: Publish private overlay release
    if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    needs: release
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build release package
        run: |
          python3 scripts/build_personal_codex_package.py \
            --sha "$GITHUB_SHA" \
            --output-dir dist

      - name: Verify release package
        run: |
          python3 scripts/private_overlay_release.py verify-package \
            --sha "$GITHUB_SHA" \
            --dist dist

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/private_overlay_release.py publish \
            --repo "$GITHUB_REPOSITORY" \
            --sha "$GITHUB_SHA" \
            --dist dist
