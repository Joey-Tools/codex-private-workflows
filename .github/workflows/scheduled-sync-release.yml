name: Scheduled Private Overlay Sync Release

on:
  schedule:
    - cron: "17 */8 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run even when the cooldown window is active."
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: write
  pull-requests: write

concurrency:
  group: private-overlay-release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-release:
    name: Sync and publish private overlay release
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-slim
    timeout-minutes: 15
    env:
      FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force && 'true' || 'false' }}
    steps:
      - name: Check out private overlay
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check current release
        id: current-release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/private_overlay_release.py release-complete \
            --repo "$GITHUB_REPOSITORY" \
            --sha "$GITHUB_SHA"

      - name: Check cooldown
        id: cooldown
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ steps.current-release.outputs.complete }}" = "false" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "reason=current release is incomplete; skipping source sync and publishing current SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          force_args=()
          if [ "$FORCE_RUN" = "true" ]; then
            force_args+=(--force)
          fi
          python3 scripts/private_overlay_release.py should-run \
            --repo "$GITHUB_REPOSITORY" \
            --workflow scheduled-sync-release.yml \
            --current-run-id "$GITHUB_RUN_ID" \
            --event "$GITHUB_EVENT_NAME" \
            --cooldown-hours 8 \
            "${force_args[@]}"

      - name: Check out codex-toolbox
        if: steps.cooldown.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: Joey-Tools/codex-toolbox
          path: .source/codex-toolbox
          persist-credentials: false

      - name: Check out codex-debug-triage
        if: steps.cooldown.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: Joey-Tools/codex-debug-triage
          path: .source/codex-debug-triage
          persist-credentials: false

      - name: Check out codex-review-workflows
        if: steps.cooldown.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: Joey-Tools/codex-review-workflows
          path: .source/codex-review-workflows
          persist-credentials: false

      - name: Check out codex-workflow-hygiene
        if: steps.cooldown.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: Joey-Tools/codex-workflow-hygiene
          path: .source/codex-workflow-hygiene
          persist-credentials: false

      - name: Check out codex-project-journal
        if: steps.cooldown.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: Joey-Tools/codex-project-journal
          path: .source/codex-project-journal
          persist-credentials: false

      - name: Check out codex-waited-delivery
        if: steps.cooldown.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: Joey-Tools/codex-waited-delivery
          path: .source/codex-waited-delivery
          persist-credentials: false

      - name: Sync private overlay sources
        if: steps.cooldown.outputs.run == 'true'
        run: python3 scripts/sync_private_overlay_sources.py --source-root .source

      - name: Detect sync changes
        if: steps.cooldown.outputs.run == 'true'
        id: changes
        run: |
          status="$(git status --porcelain -- scripts personal_codex .agents)"
          if [ -z "$status" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No private overlay source changes detected."
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$status"

      - name: Compile helpers
        if: steps.changes.outputs.changed == 'true' || steps.current-release.outputs.complete == 'false'
        run: |
          python3 -m py_compile \
            scripts/codex_personal_sync.py \
            scripts/build_personal_codex_package.py \
            scripts/private_overlay_release.py \
            scripts/sync_private_overlay_sources.py \
            tests/test_private_overlay_package.py \
            tests/test_private_overlay_sync.py

      - name: Run tests
        if: steps.changes.outputs.changed == 'true' || steps.current-release.outputs.complete == 'false'
        run: python3 -m unittest discover -s tests

      - name: Open synced overlay pull request
        if: steps.changes.outputs.changed == 'true'
        id: sync-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="codex/scheduled-private-overlay-sync"
          body_file="$(mktemp)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add scripts personal_codex .agents
          git commit -m "Sync private overlay sources"

          remote_sha="$(git ls-remote --heads origin "$branch" | awk '{print $1}')"
          if [ -n "$remote_sha" ]; then
            git push --force-with-lease="refs/heads/$branch:$remote_sha" origin "HEAD:$branch"
          else
            git push origin "HEAD:$branch"
          fi

          cat > "$body_file" <<EOF
          ## Summary
          - Syncs private overlay sources from the public Joey-Tools repositories.
          - Replaces the previous scheduled direct-push path, which is blocked by branch rules.

          ## Validation
          - python3 -m py_compile scripts/codex_personal_sync.py scripts/build_personal_codex_package.py scripts/private_overlay_release.py scripts/sync_private_overlay_sources.py tests/test_private_overlay_package.py tests/test_private_overlay_sync.py
          - python3 -m unittest discover -s tests
          EOF

          label_args=()
          if gh label list --limit 100 --json name --jq '.[].name' | grep -qx 'codex'; then
            label_args+=(--label codex)
          fi
          if gh label list --limit 100 --json name --jq '.[].name' | grep -qx 'codex-automation'; then
            label_args+=(--label codex-automation)
          fi

          pr_url="$(gh pr list --state open --base "$GITHUB_REF_NAME" --head "$branch" --json url --jq '.[0].url // empty')"
          if [ -n "$pr_url" ]; then
            gh pr edit "$pr_url" --title "[codex] Sync private overlay sources" --body-file "$body_file"
          else
            pr_url="$(gh pr create \
              --title "[codex] Sync private overlay sources" \
              --body-file "$body_file" \
              --base "$GITHUB_REF_NAME" \
              --head "$branch" \
              "${label_args[@]}")"
          fi
          echo "url=$pr_url" >> "$GITHUB_OUTPUT"
          echo "Opened or updated $pr_url"

      - name: Build release package
        if: steps.current-release.outputs.complete == 'false'
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          python3 scripts/build_personal_codex_package.py \
            --sha "$RELEASE_SHA" \
            --output-dir dist

      - name: Verify release package
        if: steps.current-release.outputs.complete == 'false'
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          python3 scripts/private_overlay_release.py verify-package \
            --sha "$RELEASE_SHA" \
            --dist dist

      - name: Publish GitHub release
        if: steps.current-release.outputs.complete == 'false'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          python3 scripts/private_overlay_release.py publish \
            --repo "$GITHUB_REPOSITORY" \
            --sha "$RELEASE_SHA" \
            --dist dist \
            --source-event "$GITHUB_EVENT_NAME"
