name: Scheduled Private Overlay Sync Release

on:
  schedule:
    - cron: "17 */8 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run even when the cooldown window is active."
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: write
  pull-requests: write

concurrency:
  group: private-overlay-release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-release:
    name: Sync and publish private overlay release
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force && 'true' || 'false' }}
    steps:
      - name: Check out private overlay
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Isolate Python bytecode cache
        run: echo "PYTHONPYCACHEPREFIX=$RUNNER_TEMP/python-cache" >> "$GITHUB_ENV"

      - name: Check current release
        id: current-release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/private_overlay_release.py release-complete \
            --repo "$GITHUB_REPOSITORY" \
            --sha "$GITHUB_SHA"

      - name: Check cooldown
        id: cooldown
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ steps.current-release.outputs.complete }}" = "false" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "reason=current release is incomplete; skipping source sync and publishing current SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          force_args=()
          if [ "$FORCE_RUN" = "true" ]; then
            force_args+=(--force)
          fi
          python3 scripts/private_overlay_release.py should-run \
            --repo "$GITHUB_REPOSITORY" \
            --workflow scheduled-sync-release.yml \
            --current-run-id "$GITHUB_RUN_ID" \
            --event "$GITHUB_EVENT_NAME" \
            --cooldown-hours 8 \
            "${force_args[@]}"

      - name: Check out codex-toolbox
        if: steps.cooldown.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: Joey-Tools/codex-toolbox
          path: .source/codex-toolbox
          persist-credentials: false

      - name: Check out codex-debug-triage
        if: steps.cooldown.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: Joey-Tools/codex-debug-triage
          path: .source/codex-debug-triage
          persist-credentials: false

      - name: Check out codex-review-workflows
        if: steps.cooldown.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: Joey-Tools/codex-review-workflows
          path: .source/codex-review-workflows
          persist-credentials: false

      - name: Check out codex-workflow-hygiene
        if: steps.cooldown.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: Joey-Tools/codex-workflow-hygiene
          path: .source/codex-workflow-hygiene
          persist-credentials: false

      - name: Check out codex-project-journal
        if: steps.cooldown.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: Joey-Tools/codex-project-journal
          path: .source/codex-project-journal
          persist-credentials: false

      - name: Check out codex-waited-delivery
        if: steps.cooldown.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: Joey-Tools/codex-waited-delivery
          path: .source/codex-waited-delivery
          persist-credentials: false

      - name: Sync private overlay sources
        if: steps.cooldown.outputs.run == 'true'
        run: python3 scripts/sync_private_overlay_sources.py --source-root .source

      - name: Detect sync changes
        if: steps.cooldown.outputs.run == 'true'
        id: changes
        run: |
          status="$(git status --porcelain -- scripts tests personal_codex .agents)"
          if [ -z "$status" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No private overlay source changes detected."
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$status"

      - name: Compile helpers
        if: steps.changes.outputs.changed == 'true' || steps.current-release.outputs.complete == 'false'
        run: |
          python3 -m py_compile \
            scripts/codex_personal_sync.py \
            scripts/build_personal_codex_package.py \
            scripts/validate_sync_manifest_changes.py \
            scripts/private_overlay_release.py \
            scripts/sync_private_overlay_sources.py \
            tests/test_package_builder_safety.py \
            tests/test_personal_sync_reconciliation_safety.py \
            tests/test_private_overlay_package.py \
            tests/test_private_overlay_sync.py \
            tests/test_release_manifest_baseline.py \
            tests/test_sync_manifest_changes.py

      - name: Run tests
        if: steps.changes.outputs.changed == 'true' || steps.current-release.outputs.complete == 'false'
        run: python3 -m unittest discover -s tests

      - name: Validate sync manifest changes
        if: steps.changes.outputs.changed == 'true' || steps.current-release.outputs.complete == 'false'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/validate_sync_manifest_changes.py \
            --release-repo "$GITHUB_REPOSITORY"

      - name: Verify canonical review workflow
        if: steps.changes.outputs.changed == 'true' || steps.current-release.outputs.complete == 'false'
        run: |
          python3 -m unittest discover \
            -s personal_codex/skills/review-orchestration-playbook/tests \
            -p 'test_*.py'

      - name: Verify waited-delivery review contract
        if: steps.changes.outputs.changed == 'true' || steps.current-release.outputs.complete == 'false'
        run: |
          python3 -m unittest discover \
            -s personal_codex/skills/waited-delivery/tests \
            -p 'test_*.py'

      - name: Open synced overlay pull request
        if: steps.changes.outputs.changed == 'true'
        id: sync-pr
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_OVERLAY_SYNC_PR_TOKEN }}
          SYNC_PR_TOKEN: ${{ secrets.PRIVATE_OVERLAY_SYNC_PR_TOKEN }}
        run: |
          branch="codex/scheduled-private-overlay-sync"
          owner="${GITHUB_REPOSITORY%%/*}"
          remote_ref="refs/heads/$branch"
          body_file="$(mktemp)"
          label="codex-automation"
          head_sha=""
          if [ -z "$SYNC_PR_TOKEN" ]; then
            echo "PRIVATE_OVERLAY_SYNC_PR_TOKEN is required so sync PR pushes trigger pull_request workflows." >&2
            exit 1
          fi
          if ! gh api --method GET "repos/$GITHUB_REPOSITORY/labels/$label" --jq '.name' >/dev/null; then
            echo "Required label '$label' is missing from $GITHUB_REPOSITORY." >&2
            exit 1
          fi
          git remote set-url origin "https://x-access-token:${SYNC_PR_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          remote_sha="$(git ls-remote --heads origin "$remote_ref" | awk -v ref="$remote_ref" '$2 == ref {print $1}')"
          remote_count="$(printf '%s\n' "$remote_sha" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [ "$remote_count" -gt 1 ]; then
            echo "Multiple remote refs unexpectedly matched $remote_ref" >&2
            exit 1
          fi
          if [ -n "$remote_sha" ]; then
            git fetch --no-tags origin "$remote_ref"
          fi

          git add scripts tests personal_codex .agents

          remote_has_current_base=false
          if [ -n "$remote_sha" ] && git merge-base --is-ancestor "$GITHUB_SHA" FETCH_HEAD; then
            remote_has_current_base=true
          fi

          if [ -n "$remote_sha" ] && [ "$remote_has_current_base" = "true" ] && git diff --cached --quiet FETCH_HEAD; then
            echo "Existing $branch already matches the full generated overlay tree and contains $GITHUB_SHA."
            head_sha="$remote_sha"
          else
            git switch -c "$branch"
            git commit -m "Sync private overlay sources"
            head_sha="$(git rev-parse HEAD)"
            if [ -n "$remote_sha" ]; then
              git push --force-with-lease="$remote_ref:$remote_sha" origin "HEAD:$branch"
            else
              git push origin "HEAD:$branch"
            fi
          fi

          cat > "$body_file" <<EOF
          ## Summary
          - Syncs private overlay sources from the public Joey-Tools repositories.
          - Replaces the previous scheduled direct-push path, which is blocked by branch rules.

          ## Validation
          - python3 -m py_compile scripts/codex_personal_sync.py scripts/build_personal_codex_package.py scripts/validate_sync_manifest_changes.py scripts/private_overlay_release.py scripts/sync_private_overlay_sources.py tests/test_package_builder_safety.py tests/test_personal_sync_reconciliation_safety.py tests/test_private_overlay_package.py tests/test_private_overlay_sync.py tests/test_release_manifest_baseline.py tests/test_sync_manifest_changes.py
          - python3 -m unittest discover -s tests
          - python3 -m unittest discover -s personal_codex/skills/review-orchestration-playbook/tests -p 'test_*.py'
          - python3 -m unittest discover -s personal_codex/skills/waited-delivery/tests -p 'test_*.py'
          EOF

          pr_url="$(gh api --method GET "repos/$GITHUB_REPOSITORY/pulls" \
            -f state=open \
            -f base="$GITHUB_REF_NAME" \
            -f head="$owner:$branch" \
            --jq '.[0].html_url // empty')"
          if [ -n "$pr_url" ]; then
            gh pr edit "$pr_url" --title "[codex] Sync private overlay sources" --body-file "$body_file" --add-label "$label"
          else
            pr_url="$(gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --title "[codex] Sync private overlay sources" \
              --body-file "$body_file" \
              --base "$GITHUB_REF_NAME" \
              --head "$branch" \
              --label "$label")"
          fi

          pr_head_sha="$(gh pr view "$pr_url" --json headRefOid --jq '.headRefOid')"
          pr_head_ref="$(gh pr view "$pr_url" --json headRefName --jq '.headRefName')"
          pr_base_ref="$(gh pr view "$pr_url" --json baseRefName --jq '.baseRefName')"
          if [ "$pr_head_ref" != "$branch" ] || [ "$pr_base_ref" != "$GITHUB_REF_NAME" ]; then
            echo "Refusing to auto-merge unexpected PR shape: base=$pr_base_ref head=$pr_head_ref" >&2
            exit 1
          fi
          if [ "$pr_head_sha" != "$head_sha" ]; then
            echo "Refusing to auto-merge $pr_url because head changed from $head_sha to $pr_head_sha." >&2
            exit 1
          fi
          if ! git diff --cached --quiet "$head_sha" || ! git diff --quiet "$head_sha"; then
            echo "Refusing to auto-merge $pr_url because $head_sha does not match the full generated overlay tree." >&2
            exit 1
          fi

          auto_merge_enabled="$(gh pr view "$pr_url" --json autoMergeRequest --jq '.autoMergeRequest != null')"
          if [ "$auto_merge_enabled" = "true" ]; then
            echo "Auto-merge is already enabled for $pr_url."
          else
            gh pr merge "$pr_url" --auto --squash --delete-branch --match-head-commit "$head_sha"
          fi
          echo "url=$pr_url" >> "$GITHUB_OUTPUT"
          echo "Opened or updated $pr_url and enabled auto-merge for $head_sha."

      - name: Revalidate release checkout
        if: steps.current-release.outputs.complete == 'false' && steps.changes.outputs.changed != 'true'
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          actual_sha="$(git rev-parse HEAD)"
          if [[ "$actual_sha" != "$RELEASE_SHA" ]]; then
            echo "Release checkout moved: expected $RELEASE_SHA, got $actual_sha" >&2
            exit 1
          fi
          if [[ -n "$(git status --porcelain=v1 --untracked-files=all)" ]]; then
            echo "Release checkout changed after validation; refusing to publish." >&2
            git status --short
            exit 1
          fi

      - name: Build release package
        if: steps.current-release.outputs.complete == 'false' && steps.changes.outputs.changed != 'true'
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          python3 scripts/build_personal_codex_package.py \
            --sha "$RELEASE_SHA" \
            --require-clean-sources \
            --output-dir dist

      - name: Verify release package
        if: steps.current-release.outputs.complete == 'false' && steps.changes.outputs.changed != 'true'
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          python3 scripts/private_overlay_release.py verify-package \
            --sha "$RELEASE_SHA" \
            --dist dist

      - name: Publish GitHub release
        if: steps.current-release.outputs.complete == 'false' && steps.changes.outputs.changed != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          python3 scripts/private_overlay_release.py publish \
            --repo "$GITHUB_REPOSITORY" \
            --sha "$RELEASE_SHA" \
            --dist dist \
            --source-event "$GITHUB_EVENT_NAME"
